name: akademik_ppkh
description: Sistem Informasi Pondok Pesantren Khoirul Huda - Prediksi Kelulusan Santri dengan Random Forest

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  
  cupertino_icons: ^1.0.6
  provider: ^6.1.2
  google_fonts: ^6.2.1
  flutter_spinkit: ^5.2.1

 
  firebase_core: ^3.1.1
  cloud_firestore: ^5.0.2
  firebase_auth: ^5.1.2
  firebase_storage: ^12.1.2

  intl: ^0.19.0
  shared_preferences: ^2.2.3
  
  fl_chart: ^0.66.2

  pdf: ^3.10.8
  printing: ^5.11.1
  path_provider: ^2.1.3
  open_file: ^3.5.11
  excel: ^4.0.0
  share_plus: ^7.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # Asset disiapkan jika nanti Anda ingin menambah logo fisik
  assets:
    - assets/images/logo.png
    - assets/images/pesantren.jpg
    - assets/icons/
    - assets/images/logo rapot.png

  # Font tambahan (Opsional jika menggunakan Google Fonts)
  # fonts:
  #   - family: TrajanPro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf